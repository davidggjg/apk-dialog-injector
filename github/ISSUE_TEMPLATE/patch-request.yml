name: בקשה לתיקון APK
description: בקש להוסיף דיאלוג מותאם אישית לקובץ APK
title: "[PATCH] "
labels: ["patch-request"]
body:
  - type: markdown
    attributes:
      value: |
        ## הזן את הפרטים הבאים כדי ליצור APK עם דיאלוג מותאם

  - type: input
    id: apk_url
    attributes:
      label: קישור לקובץ APK
      description: העלה את ה‑APK לאתר כלשהו וספק קישור ציבורי
      placeholder: https://example.com/app.apk
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: כותרת הדיאלוג
      placeholder: הודעה חשובה
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: תוכן ההודעה
      placeholder: הקלד את ההודעה כאן...
    validations:
      required: true

  - type: input
    id: image_url
    attributes:
      label: קישור לתמונה (אופציונלי)
      placeholder: https://example.com/image.png

  - type: checkboxes
    id: terms
    attributes:
      label: אישור
      options:
        - label: אני מאשר כי יש לי זכות לשנות את קובץ ה‑APK הזה.
          required: true
