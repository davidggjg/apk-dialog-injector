name: בקשה לתיקון APK
description: בקש להוסיף דיאלוג מותאם אישית לקובץ APK
title: "[PATCH] "
labels: ["patch-request"]
body:
  - type: markdown
    attributes:
      value: |
        ## הזן את הפרטים הבאים כדי ליצור APK עם דיאלוג מותאם

  - type: input
    id: apk_url
    attributes:
      label: קישור לקובץ APK
      description: העלה את ה‑APK לאתר כלשהו (למשל Google Drive, Dropbox) וספק קישור ציבורי להורדה
      placeholder: https://example.com/app.apk
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: כותרת הדיאלוג
      description: מה תהיה הכותרת שתופיע בחלון?
      placeholder: הודעה חשובה
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: תוכן ההודעה
      description: מה יופיע בגוף הדיאלוג?
      placeholder: הקלד את ההודעה כאן...
    validations:
      required: true

  - type: input
    id: image_url
    attributes:
      label: קישור לתמונה (אופציונלי)
      description: אם תרצה תמונה או אייקון שיופיעו בדיאלוג, ספק קישור
      placeholder: https://example.com/image.png

  - type: checkboxes
    id: terms
    attributes:
      label: אישור
      description: לפני שליחת הבקשה, אנא אשר
      options:
        - label: אני מאשר כי יש לי זכות לשנות את קובץ ה‑APK הזה (למשל, זה APK שלי או קוד פתוח).
          required: true
