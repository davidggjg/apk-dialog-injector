name: APK Dialog Patcher

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'inject or remove'
        required: true
        default: 'inject'
        type: choice
        options:
          - inject
          - remove

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup
        run: |
          sudo apt-get update -q
          sudo apt-get install -y default-jdk apksigner
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar

      - name: Find APK
        run: |
          APK=$(find input/ -name "*.apk" | head -1)
          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "[*] Found APK: $APK"

      - name: Run Patcher
        run: |
          python3 patch_apk.py ${{ env.APK_PATH }} ${{ github.event.inputs.mode }}

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: patched-apk
          path: output/patched_signed.apk
