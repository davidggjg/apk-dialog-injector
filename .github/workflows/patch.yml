name: Patch APK from Issue

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'קישור לקובץ APK'
        required: true
      title:
        description: 'כותרת הדיאלוג'
        required: true
      description:
        description: 'תוכן ההודעה'
        required: true
      image_url:
        description: 'קישור לתמונה (אופציונלי)'
        required: false

jobs:
  patch:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'patch-request')) ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - uses: actions/checkout@v3

      - uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: docker build -t apk-patcher ./docker

      - name: Set parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            APK_URL="${{ github.event.inputs.apk_url }}"
            TITLE="${{ github.event.inputs.title }}"
            DESC="${{ github.event.inputs.description }}"
            IMG_URL="${{ github.event.inputs.image_url }}"
          else
            gh issue view ${{ github.event.issue.number }} --json body --jq .body > issue_body.txt
            APK_URL=$(grep -i "APK_URL:" issue_body.txt | sed 's/APK_URL: *//i' | tr -d '\r')
            TITLE=$(grep -i "TITLE:" issue_body.txt | sed 's/TITLE: *//i' | tr -d '\r')
            DESC=$(grep -i "DESCRIPTION:" issue_body.txt | sed 's/DESCRIPTION: *//i' | tr -d '\r')
            IMG_URL=$(grep -i "IMAGE_URL:" issue_body.txt | sed 's/IMAGE_URL: *//i' | tr -d '\r')
          fi
          echo "APK_URL=$APK_URL" >> $GITHUB_OUTPUT
          echo "TITLE=$TITLE" >> $GITHUB_OUTPUT
          echo "DESC=$DESC" >> $GITHUB_OUTPUT
          echo "IMG_URL=$IMG_URL" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download APK
        run: wget -O "${{ github.workspace }}/original.apk" "${{ steps.params.outputs.APK_URL }}"

      - name: Run patcher
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            apk-patcher \
            /work/original.apk \
            "${{ steps.params.outputs.TITLE }}" \
            "${{ steps.params.outputs.DESC }}" \
            "${{ steps.params.outputs.IMG_URL }}"

      - name: Upload patched APK (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v3
        with:
          name: patched-apk
          path: ${{ github.workspace }}/patched.apk

      - name: Upload patched APK as artifact (issue runs)
        if: github.event_name == 'issues'
        uses: actions/upload-artifact@v3
        with:
          name: patched-apk-issue-${{ github.event.issue.number }}
          path: ${{ github.workspace }}/patched.apk

      - name: Post comment on issue
        if: github.event_name == 'issues'
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue comment ${{ github.event.issue.number }} \
            --body "✅ ה‑APK תוקן בהצלחה!

          להורדת הקובץ המתוקן, כנס לקישור הבא ולחץ על \`patched-apk-issue-${{ github.event.issue.number }}\` תחת **Artifacts**:
          $RUN_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
